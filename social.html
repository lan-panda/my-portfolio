<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Social — Trần Thị Lan</title>
    <meta name="description" content="Kênh social của Trần Thị Lan — YouTube, Facebook, TikTok">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'flower-pink': '#FFB6C1',
                        'flower-green': '#90EE90',
                        'flower-purple': '#DDA0DD',
                        'flower-yellow': '#FFE4B5',
                        'leaf-green': '#228B22',
                        'soil-brown': '#8B4513',
                        'youtube-red': '#FF0000',
                        'facebook-blue': '#1877F2',
                        'tiktok-black': '#000000'
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        .petal {
            background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 100%);
            border-radius: 0 100% 0 100%;
            position: absolute;
        }
        .flower-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-pink-50 min-h-screen">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md shadow-sm z-50">
        <div class="container mx-auto px-6 py-2">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="flower-container scale-50 -ml-4">
                        <div class="petal w-8 h-8"></div>
                        <div class="petal w-8 h-8"></div>
                        <div class="petal w-8 h-8"></div>
                        <div class="petal w-8 h-8"></div>
                        <div class="petal w-8 h-8"></div>
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-flower-yellow rounded-full"></div>
                    </div>
                    <span class="text-xl font-bold text-leaf-green">Trần Thị Lan</span>
                </div>
                <ul class="hidden md:flex space-x-8">
                    <li><a href="index.html" class="text-gray-700 hover:text-leaf-green transition">Trang chủ</a></li>
                    <li><a href="index.html#about" class="text-gray-700 hover:text-leaf-green transition">Giới thiệu</a></li>
                    <li><a href="blog.html" class="text-gray-700 hover:text-leaf-green transition">Blog</a></li>
                    <li><a href="social.html" class="text-leaf-green font-semibold transition">Social</a></li>
                    <li><a href="index.html#contact" class="text-gray-700 hover:text-leaf-green transition">Liên hệ</a></li>
                </ul>
                <button class="md:hidden text-gray-700" onclick="toggleMobileMenu()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            <div id="mobileMenu" class="hidden md:hidden mt-4">
                <ul class="space-y-2">
                    <li><a href="index.html" class="block py-2 text-gray-700 hover:text-leaf-green transition">Trang chủ</a></li>
                    <li><a href="index.html#about" class="block py-2 text-gray-700 hover:text-leaf-green transition">Giới thiệu</a></li>
                    <li><a href="blog.html" class="block py-2 text-gray-700 hover:text-leaf-green transition">Blog</a></li>
                    <li><a href="social.html" class="block py-2 text-leaf-green font-semibold transition">Social</a></li>
                    <li><a href="index.html#contact" class="block py-2 text-gray-700 hover:text-leaf-green transition">Liên hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Social Content -->
    <main class="pt-20 pb-12">
        <div class="container mx-auto px-6">
            <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">Social</h1>

            <!-- Tab Icons -->
            <div class="flex justify-center space-x-8 mb-8">
                <button onclick="showTab('youtube')" id="tabBtn-youtube" class="tab-btn active flex flex-col items-center space-y-2 p-4 rounded-xl bg-leaf-green shadow-md hover:shadow-lg transition">
                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                    <span class="text-sm font-medium text-white">YouTube</span>
                </button>
                <button onclick="showTab('facebook')" id="tabBtn-facebook" class="tab-btn flex flex-col items-center space-y-2 p-4 rounded-xl bg-white shadow-md hover:shadow-lg transition">
                    <svg class="w-10 h-10 text-facebook-blue" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">Facebook</span>
                </button>
                <button onclick="showTab('tiktok')" id="tabBtn-tiktok" class="tab-btn flex flex-col items-center space-y-2 p-4 rounded-xl bg-white shadow-md hover:shadow-lg transition">
                    <svg class="w-10 h-10 text-tiktok-black" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">TikTok</span>
                </button>
            </div>

            <!-- Tab Content -->
            <div class="max-w-5xl mx-auto">
                <!-- YouTube Tab -->
                <div id="tab-youtube" class="tab-content">
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-2xl font-semibold text-gray-800">YouTube</h2>
                            <a href="https://youtube.com/@360sacdep" target="_blank" rel="noopener noreferrer"
                               class="text-youtube-red hover:text-red-700 transition text-sm">
                                Mở kênh →
                            </a>
                        </div>
                        <!-- YouTube video list -->
                        <div id="youtubeLoading" class="text-center py-8">
                            <p class="text-gray-500">Đang tải video...</p>
                        </div>
                        <div id="youtubeVideos" class="grid grid-cols-2 md:grid-cols-3 gap-4 hidden"></div>
                    </div>
                </div>

                <!-- Facebook Tab -->
                <div id="tab-facebook" class="tab-content hidden">
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-2xl font-semibold text-gray-800">Facebook</h2>
                            <a href="https://facebook.com/360sacdep" target="_blank" rel="noopener noreferrer"
                               class="text-facebook-blue hover:text-blue-700 transition text-sm">
                                Mở trang →
                            </a>
                        </div>
                        <div class="flex justify-center">
                            <iframe
                                src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2F360sacdep&tabs=timeline&width=500&height=700&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"
                                width="500"
                                height="700"
                                style="border:none;overflow:hidden"
                                scrolling="no"
                                frameborder="0"
                                allowfullscreen="true"
                                allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
                                loading="lazy"
                            ></iframe>
                        </div>
                    </div>
                </div>

                <!-- TikTok Tab -->
                <div id="tab-tiktok" class="tab-content hidden">
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-2xl font-semibold text-gray-800">TikTok</h2>
                            <a href="https://www.tiktok.com/@skiny.khoa" target="_blank" rel="noopener noreferrer"
                               class="text-tiktok-black hover:text-gray-700 transition text-sm">
                                Mở profile →
                            </a>
                        </div>
                        <div class="flex justify-center">
                            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@skiny.khoa" data-unique-id="skiny.khoa" data-embed-type="creator" style="max-width: 780px; min-width: 288px;">
                                <section>
                                    <a target="_blank" href="https://www.tiktok.com/@skiny.khoa?refer=creator_embed">@skiny.khoa</a>
                                </section>
                            </blockquote>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 bg-gradient-to-t from-green-100 to-transparent">
        <div class="container mx-auto px-6 text-center">
            <p class="text-gray-600">Made with 🌸 by Trần Thị Lan</p>
        </div>
    </footer>

    <!-- TikTok Embed -->
    <script async src="https://www.tiktok.com/embed.js"></script>

    <script>
        // Mobile menu toggle
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }

        document.querySelectorAll('#mobileMenu a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('mobileMenu').classList.add('hidden');
            });
        });

        // Tab switching
        function showTab(platform) {
            // Hide all tab content
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
            });

            // Show selected tab
            document.getElementById(`tab-${platform}`).classList.remove('hidden');

            // Update active state for buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.remove('bg-leaf-green');
                btn.querySelector('svg').classList.remove('text-white');
                btn.querySelector('span').classList.remove('text-white');
                btn.classList.add('bg-white');
                btn.querySelector('svg').classList.add('text-' + btn.id.replace('tabBtn-', '') + (btn.id.includes('youtube') ? '-red' : btn.id.includes('facebook') ? '-blue' : '-black'));
                btn.querySelector('span').classList.add('text-gray-700');
            });

            const activeBtn = document.getElementById(`tabBtn-${platform}`);
            activeBtn.classList.add('active');
            activeBtn.classList.remove('bg-white');
            activeBtn.classList.add('bg-leaf-green');
            activeBtn.querySelector('svg').classList.remove('text-' + platform + (platform === 'youtube' ? '-red' : platform === 'facebook' ? '-blue' : '-black'));
            activeBtn.querySelector('svg').classList.add('text-white');
            activeBtn.querySelector('span').classList.remove('text-gray-700');
            activeBtn.querySelector('span').classList.add('text-white');

            // Re-render Facebook embed when switching to Facebook tab
            if (platform === 'facebook' && typeof FB !== 'undefined') {
                FB.XFBML.parse();
            }
        }

        // Initialize with YouTube tab active
        document.addEventListener('DOMContentLoaded', () => {
            showTab('youtube');
        });

        // YouTube Videos - hardcoded for stability
        const ytVideos = [
            { id: 'EnErIX5BEjM', title: 'Shorts #1' },
            { id: '55Lt9OHffY8', title: 'Shorts #2' },
            { id: 'EJIa7_1IajE', title: 'Shorts #3' },
            { id: 'BPt0CaL5jps', title: 'Shorts #4' },
            { id: 'pg-KIzvaxDM', title: 'Shorts #5' },
            { id: 'IILy0Qd70Cc', title: 'Shorts #6' }
        ];

        function renderYouTubeVideos() {
            const videosContainer = document.getElementById('youtubeVideos');
            const loading = document.getElementById('youtubeLoading');

            videosContainer.innerHTML = ytVideos.map(v => `
                <a href="https://www.youtube.com/shorts/${v.id}" target="_blank" rel="noopener noreferrer"
                   class="block bg-gray-50 rounded-lg overflow-hidden hover:shadow-md transition group">
                    <div class="relative">
                        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" class="w-full h-40 object-cover">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition flex items-center justify-center">
                            <svg class="w-12 h-12 text-white opacity-0 group-hover:opacity-100 transition" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                            </svg>
                        </div>
                    </div>
                </a>
            `).join('');

            loading.classList.add('hidden');
            videosContainer.classList.remove('hidden');
        }

        renderYouTubeVideos();
    </script>
</body>
</html>
